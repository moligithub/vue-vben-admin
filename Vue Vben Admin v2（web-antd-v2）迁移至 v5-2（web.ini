3.3 API 调用方式 v2→v5 完整迁移（语法、封装、类型全适配）
3.3.1 v2 API 特征（旧，需彻底替换）
- 封装方式：defHttp / axios 实例（核心文件：src/utils/http/axios.ts）
- 导入方式：import { defHttp } from '/@/utils/http/axios';
- 调用写法：export function getUserList(params: UserParams) {
  return defHttp.get<UserListResult>({ url: '/user/list', params });
}
- 响应处理：直接返回 data 字段，自动处理错误、loading、token 拦截
3.3.2 v5 API 特征（新，必须严格适配）
- 封装方式：@vben/request + requestClient（核心文件：src/api/request.ts，v5 原生封装）
- 导入方式：import { requestClient } from '#/api/request';
- 调用写法：export async function getUserList(params: UserParams) {
  return requestClient.get<UserListResult>('/user/list', { params });
}
- 响应处理：直接返回 data 字段，自动处理 401 权限异常、token 刷新、错误提示，适配 v5 响应拦截规范
- 环境变量：使用 v5 规范的 import.meta.env.VITE_GLOB_API_URL 配置接口基础地址，替代 v2 环境变量
3.3.3 迁移规则（强制执行，无例外）
1. 删除旧封装：彻底删除 v2 中所有 defHttp 相关代码、src/utils/http/axios.ts 文件，不保留任何旧 API 封装痕迹。
2. 替换导入语句：所有 API 函数中的 defHttp 导入，全部替换为 requestClient 导入，确保导入路径正确（适配 v5 别名 #/api/request）。
3. 替换调用写法：所有 defHttp 调用，按 v5 规范替换为 requestClient 调用，具体对应：
  - 旧：defHttp.get({ url: '/xxx', params }) → 新：requestClient.get('/xxx', { params })
  - 旧：defHttp.post({ url: '/xxx', data }) → 新：requestClient.post('/xxx', data)
  - 旧：defHttp.put/delete 等其他请求方式，按上述规则统一替换
4. 统一 async/await：所有 API 函数必须添加 async 关键字，确保异步请求规范，适配 v5 异步处理逻辑。
5. 类型修复：所有 API 函数的返回类型、参数类型，适配 v5 requestClient 与 HttpResponse 类型规范，消除所有 TS 类型错误。
6. 拦截器迁移：v2 中 defHttp 的请求拦截、响应拦截逻辑（token 携带、错误处理、loading 控制等），全部迁移至 v5 src/api/request.ts 中，适配 v5 拦截器规范，保持原有拦截逻辑不变。
7. 接口地址适配：所有 API 接口地址，自动适配 v5 VITE_GLOB_API_URL 环境变量，确保接口请求正常，无跨域、地址错误问题。
四、完整迁移约束规则（必须严格遵守，禁止违规）
1. 边界约束：仅迁移用户自定义业务代码，绝对不修改、不覆盖、不破坏 v5 原生框架代码（@core、internal、packages、web-antd 原生配置、框架自带组件/工具等），避免导致 v5 框架异常。
2. UI 兼容：自动适配 ant-design-vue v3 → v4/v5 的语法、组件、API 破坏性变更（如组件Props变更、事件名变更、组件废弃等），确保所有业务组件渲染正常，无 UI 错乱、功能异常。
3. 架构适配：自动适配 v5 全新的路由结构、权限系统、请求封装、hooks 规范、Pinia store 结构，确保迁移后路由跳转、权限控制、状态管理正常。
4. 路径适配：自动修复所有路径别名（/@/、/#/），适配 v5 目录结构，确保所有导入、引用路径正确，无模块找不到错误。
5. 类型修复：自动修复所有 TS 类型错误、导入错误、循环依赖问题，确保项目符合 TypeScript 严格模式要求，无类型警告、无编译错误。
6. 组件规范：所有 Vue 组件统一转换为 <script setup> + Composition API 风格，剔除 v2 中 Options API 写法，适配 v5 组件规范。
7. 业务一致性：迁移过程中，所有业务逻辑、接口请求、表单交互、表格渲染、弹窗逻辑、权限控制等，100% 保持与原 v2 项目一致，不改变任何业务行为、不遗漏任何业务功能。=
8. 配置适配：自动适配 v5 环境变量、代理配置、构建配置，确保迁移后项目可正常启动、正常打包，无需手动修改配置。
9. 代码规范：保留原 v2 项目的代码命名、注释、结构，不做无意义重构，确保迁移后代码可维护性，与原业务代码风格一致。
10. 依赖兼容：自动检查并适配 v2 第三方依赖（echarts、monaco-editor、jsbarcode 等），确保迁移后第三方依赖可正常使用，无依赖冲突。
五、迁移执行顺序（按模块分步执行，确保逻辑连贯、无依赖错误）
1. 基础配置迁移：迁移 v2 环境变量、路径别名、代理配置，适配 v5 配置规范，确保基础环境正常。
2. 路由与权限迁移：迁移 v2 路由配置、权限逻辑，适配 v5 动态路由、权限系统规范，修复路由导入、跳转路径。
3. 基础工具迁移：迁移 v2 枚举、工具函数、自定义指令、自定义 Hooks，适配 v5 规范，处理重名冲突、路径修复。
4. Pinia 状态迁移：迁移 v2 store 目录下所有 Pinia 模块，适配 v5 Pinia 规范，修复状态引用、类型错误。
5. API 完整迁移：迁移 v2 api 目录下所有接口函数，替换 defHttp 为 requestClient，修复导入、调用写法、拦截器，处理重名冲突。
6. 组件迁移：迁移 v2 components、layouts 目录下所有业务组件，转换为 <script setup> 风格，将 UnoCSS 样式转为 TailwindCSS，处理重名冲突、UI 适配。
7. 页面迁移：迁移 v2 views 目录下所有业务页面，转换组件风格、修复样式、修复 API 调用，处理重名冲突，确保页面渲染、交互正常。
8. 全局样式与国际化迁移：迁移 v2 全局样式、Less 主题变量、国际化配置，适配 v5 Tailwind 样式、vue-i18n 规范。
9. 入口文件适配：迁移并适配 v2 App.vue、main.ts，适配 v5 入口初始化逻辑，修复组件引用、路由挂载、全局配置。
10. 合并路径修复：全局检查所有合并、差异化命名后文件的引用路径，自动修复所有导入、引用错误，确保无路径相关报错。
11. 整体校验：自动校验项目启动、TS 类型、组件渲染、API 请求、权限控制，修复所有遗留错误。
12. 构建校验：自动执行 pnpm build 校验，修复打包过程中的错误，确保项目可正常打包。
六、最终验收标准（必须全部满足，缺一不可）
1. 启动正常：项目可通过 pnpm dev 正常启动，无控制台报错、无警告，可正常访问页面。
2. 样式合规：无任何 UnoCSS 残留（无相关依赖、无相关代码、无 uno.config.ts），全部样式使用 TailwindCSS，视觉效果、动画效果与原 v2 项目完全一致，无样式错乱。
3. API 合规：所有 API 100% 使用 v5 requestClient，无 defHttp 残留，接口请求正常、拦截逻辑正常、错误处理正常，无 API 相关报错。
4. 重名处理合规：无任何文件/文件夹被覆盖，无冗余的“xxx-v2”目录/文件；重名目录按“保留 v5 框架内容、合并 v2 业务内容”处理，重名文件按“合并代码、差异化命名（需区分时）”处理，合并后路径、引用全部修复，无路径错误，适配后续开发维护。
5. 功能正常：路由跳转、权限控制、菜单渲染、表单交互、表格渲染、弹窗逻辑、国际化等所有业务功能，与原 v2 项目完全一致，无功能遗漏、无交互异常。
6. 类型合规：无任何 TS 类型错误、编译错误，符合 TypeScript 严格模式要求。
7. 构建正常：执行 pnpm build 可正常构建，无打包错误、无警告，打包产物可正常部署。
8. 框架兼容：不破坏 v5 原生框架代码，@core、internal 等核心模块正常，v5 原生功能（主题切换、动态菜单等）正常使用。
9. 依赖正常：所有第三方依赖适配正常，无依赖冲突、无模块找不到错误。
10. 代码规范：符合 v5 代码规范、组件规范，无语法错误、无冗余代码，可正常维护。
七、补充说明（避免迁移踩坑）
- 迁移过程中，若遇到 v2 特有的 API、组件，自动替换为 v5 对应替代方案，确保功能一致，不出现功能缺失。
- 若 v2 中有自定义的全局配置、主题配置，自动适配 v5 配置格式，保留原有配置逻辑，不改变视觉风格。
- 迁移完成后，自动生成迁移报告，明确迁移的文件、合并的代码、差异化命名的组件/文件、修复的错误，方便后续核对。
- 严格遵循 v5 Monorepo 架构规范，不随意修改 web-antd 子项目以外的文件（如根目录 package.json、internal 目录等）。
